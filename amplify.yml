version: 1
backend:
  phases:
    build:
      commands:
        - echo "Starting backend build..."
        - cd amplify && npm install
        - echo "Deploying backend with Amplify Gen 2..."
        - cd .. && npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID || echo "Backend will be set up after frontend deployment"
frontend:
  phases:
    preBuild:
      commands:
        - cd web-app && yarn install
    build:
      commands:
        - cd web-app && yarn build
  artifacts:
    baseDirectory: web-app/out
    files:
      - '**/*'
  cache:
    paths:
      - web-app/node_modules/**/*
      - web-app/.next/cache/**/*
      - amplify/node_modules/**/*
      - server/node_modules/**/*
