version: 1
backend:
  phases:
    build:
      commands:
        - echo "Starting backend build..."
        - cd server
        - npm install
        - echo "Installing Amplify CLI..."
        - npm list -g @aws-amplify/backend-cli || npm install -g @aws-amplify/backend-cli
        - echo "Deploying backend with Amplify Gen 2..."
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID --yes
frontend:
  phases:
    preBuild:
      commands:
        - cd web-app
        - yarn install
    build:
      commands:
        - cd web-app
        - yarn build
  artifacts:
    baseDirectory: web-app/out
    files:
      - '**/*'
  cache:
    paths:
      - web-app/node_modules/**/*
      - web-app/.next/cache/**/*
      - server/node_modules/**/*