version: 1
backend:
  phases:
    build:
      commands:
        - cd amplify && npm install --cache ../.npm --prefer-offline
        - cd amplify && npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm install --prefix web-app
    build:
      commands:
        - npm run build --prefix web-app
  artifacts:
    baseDirectory: web-app/out
    files:
      - '**/*'
  cache:
    paths:
      - web-app/node_modules/**/*
      - web-app/.next/cache/**/*
      - amplify/node_modules/**/*
